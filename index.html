<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Bella Bets</title>

    <!-- ÍCONES: gerados de assets-fonte/logo-bella-bets.jpeg por `npm run gerar-icones`.
         São a variante ESCURA da marca — a logo original é preta sobre branco e sumiria no
         fundo do dash. Fundo sólido #0d0f14, nunca transparente: o iOS chapa um preto atrás
         de PNG com alfa e o ícone fica sujo. -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- MODO APP -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0d0f14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- apple-mobile-web-app-capable é o nome antigo do de cima, e o iOS ainda só entende esse. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Bella Bets" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!--
      GUARDA DE BOOT — só cuida do que acontece ANTES do app montar.

      A primeira versão usava heurística de DOM ("#root está vazio = não montou") e isso deu
      falso negativo: quando o React quebra num render ele DESMONTA a árvore, o #root fica
      vazio de novo, e a guarda concluía "não montou", recarregava e cobria um app que estava
      funcionando. Loop de reload com ?v= na URL.

      Agora a detecção é POSITIVA: o App marca window.__BELLA_MOUNTED no primeiro efeito.
      A guarda só age se essa flag NÃO existir — não há como confundir "nunca montou" com
      "montou e quebrou depois". Erro depois do mount é responsabilidade do ErroBoundary.
    -->
    <script>
      (function () {
        var CHAVE = 'bella-boot-retry';

        function montou() {
          return window.__BELLA_MOUNTED === true;
        }

        function mostrarFalha(motivo) {
          // Trava dupla: se o app montou, a guarda não escreve NADA na tela. Foi exatamente
          // isso que faltou na primeira versão.
          if (montou()) return;
          var raiz = document.getElementById('root');
          if (!raiz || raiz.innerHTML) return;

          var caixa = document.createElement('div');
          caixa.style.cssText = 'font-family:system-ui,-apple-system,sans-serif;color:#e8eaed;padding:32px 24px;text-align:center';

          var titulo = document.createElement('h1');
          titulo.textContent = 'Não consegui carregar o app';
          titulo.style.cssText = 'font-size:18px;margin:0 0 8px';

          var texto = document.createElement('p');
          texto.textContent = motivo;
          texto.style.cssText = 'color:#9aa3b2;font-size:13px;margin:0 0 20px;line-height:1.5';

          var botao = document.createElement('button');
          botao.textContent = 'Tentar de novo';
          botao.style.cssText = 'background:#f0357a;color:#fff;border:0;border-radius:6px;padding:12px 20px;font-size:14px;font-weight:600';
          botao.onclick = function () {
            try { sessionStorage.removeItem(CHAVE); } catch (e) { /* modo privado */ }
            location.replace(location.pathname + '?v=' + Date.now());
          };

          caixa.appendChild(titulo);
          caixa.appendChild(texto);
          caixa.appendChild(botao);
          raiz.appendChild(caixa);
        }

        function falhou(motivo) {
          if (montou()) return;
          var jaTentou;
          try { jaTentou = sessionStorage.getItem(CHAVE); } catch (e) { jaTentou = '1'; }
          if (!jaTentou) {
            try { sessionStorage.setItem(CHAVE, '1'); } catch (e) { /* ignora */ }
            location.replace(location.pathname + '?v=' + Date.now());
            return;
          }
          mostrarFalha(motivo);
        }

        // Arquivo DO APP que não baixou (o caso do 404 de asset em cache velho). Restrito a
        // /assets/ de propósito: favicon, fonte ou imagem que falhe não é motivo pra recarregar.
        window.addEventListener('error', function (e) {
          if (montou()) return;
          var alvo = e.target;
          if (!alvo || (alvo.tagName !== 'SCRIPT' && alvo.tagName !== 'LINK')) return;
          var url = alvo.src || alvo.href || '';
          if (url.indexOf('/assets/') === -1) return;
          falhou('Um arquivo do app não foi encontrado — provavelmente uma versão antiga em cache.');
        }, true);

        // Rede lenta ou módulo que nunca executou. 10s: o bundle tem ~460KB e 3G ruim demora.
        setTimeout(function () {
          if (montou()) return;
          falhou('O app não iniciou a tempo.');
        }, 10000);

        // Montou de fato: limpa a marca para uma falha futura poder tentar de novo.
        var conferirMontagem = setInterval(function () {
          if (!montou()) return;
          clearInterval(conferirMontagem);
          try { sessionStorage.removeItem(CHAVE); } catch (e) { /* ignora */ }

          // MODO APP: apaga o ?v= da barra depois que deu certo.
          //
          // O iOS captura a URL ATUAL quando o atalho é criado, não a start_url do manifest.
          // Se o Maikon adicionar à tela de início logo depois de uma recuperação da guarda,
          // o atalho nasceria fixado num '/?v=1753…' velho pra sempre. Trocar por '/' aqui é
          // só cosmético pro navegador, mas é o que garante um atalho limpo.
          try {
            if (location.search.indexOf('v=') !== -1 && history.replaceState) {
              history.replaceState(null, '', location.pathname);
            }
          } catch (e) { /* ignora */ }
        }, 500);
      })();
    </script>
  </body>
</html>
